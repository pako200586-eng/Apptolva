<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="theme-color" content="#F28B00">
    <title>Bitácora NOM-087 | Vista PDF</title>
    <script src="./js/jspdf.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f3f4f6; min-height: 100vh; }
        header {
            background: linear-gradient(135deg, #d97000, #F28B00);
            color: #fff;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        header h1 { font-size: 15px; font-weight: 800; letter-spacing: 0.3px; }
        header p { font-size: 10px; opacity: 0.85; margin-top: 2px; }
        #status-box {
            margin: 24px 16px;
            background: #fff;
            border-radius: 16px;
            padding: 28px 20px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            border: 1px solid #e5e7eb;
        }
        .spinner {
            width: 44px; height: 44px;
            border: 4px solid #FFF0DB;
            border-top-color: #F28B00;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #status-title { font-size: 16px; font-weight: 700; color: #1f2937; margin-bottom: 6px; }
        #status-msg { font-size: 13px; color: #6b7280; }
        #error-icon { font-size: 40px; margin-bottom: 12px; }
        #download-btn {
            display: none;
            width: 100%;
            max-width: 320px;
            margin: 16px auto 0;
            padding: 14px;
            background: #F28B00;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(242,139,0,0.3);
        }
        #download-btn:active { opacity: 0.85; }
        #pdf-frame {
            display: none;
            width: 100%;
            height: calc(100vh - 160px);
            border: none;
            border-top: 2px solid #F28B00;
        }
        #viewer-info {
            display: none;
            padding: 10px 16px;
            background: #FFF0DB;
            border-bottom: 1px solid #f28b0033;
            font-size: 11px;
            color: #92400e;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>📋 Bitácora NOM-087</h1>
            <p>GRUPO BACHOCO · Exhibición Electrónica · Av. Tecnológico 401, Celaya, Gto.</p>
        </div>
    </header>

    <div id="viewer-info">
        <strong>Vista de solo lectura</strong> — Generada desde el dispositivo del operador.
    </div>

    <div id="status-box">
        <div class="spinner" id="spinner"></div>
        <div id="status-title">Cargando Bitácora…</div>
        <div id="status-msg">Obteniendo datos del servidor, por favor espera.</div>
        <button id="download-btn" onclick="descargarPDF()">⬇️ Descargar PDF</button>
    </div>

    <iframe id="pdf-frame" title="Bitácora PDF"></iframe>

    <script>
        const SHIFT_START_HOUR = 8;
        let pdfDoc = null;

        function setStatus(title, msg, isError) {
            document.getElementById('spinner').style.display = isError ? 'none' : 'block';
            document.getElementById('status-title').textContent = title;
            document.getElementById('status-msg').textContent = msg;
        }

        function showError(msg) {
            const box = document.getElementById('status-box');
            box.style.display = 'block';
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('status-title').textContent = '❌ Error';
            document.getElementById('status-title').style.color = '#dc2626';
            document.getElementById('status-msg').textContent = msg;
        }

        function generarPDF(data) {
            if (!window.jspdf) { showError("Librería PDF no disponible."); return; }
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const naranja = [242, 139, 0];
            const azulOficial = [0, 51, 153];

            const folio = data.folio || "S/F";
            const logs = data.logs || [];
            const shiftStart = data.shiftStartHour !== undefined ? data.shiftStartHour : SHIFT_START_HOUR;

            // --- LÓGICA DE CORTE 48 HORAS ---
            const startTrip = logs.length > 0 ? logs[0].startTime : Date.now();
            const limit24Date = new Date(startTrip);
            limit24Date.setHours(shiftStart, 0, 0, 0);
            if (limit24Date.getTime() <= startTrip) limit24Date.setDate(limit24Date.getDate() + 1);
            const limit24 = limit24Date.getTime();

            const logsD1 = logs.filter(l => l.startTime < limit24);
            const logsD2 = logs.filter(l => l.startTime >= limit24 || (l.endTime && l.endTime > limit24));

            // Encabezado
            doc.setFillColor(...naranja); doc.rect(0, 0, 210, 20, 'F');
            doc.setTextColor(255); doc.setFontSize(14); doc.setFont("helvetica", "bold");
            doc.text("BITÁCORA DE HORAS DE SERVICIO", 105, 13, { align: "center" });
            doc.setFontSize(8); doc.setFont("helvetica", "normal"); doc.setTextColor(0);

            let y = 25;

            const row = (lbl, val, x, w) => {
                doc.setDrawColor(200); doc.setFillColor(245); doc.rect(x, y, w, 7, 'FD');
                doc.setFont("helvetica", "bold"); doc.text(lbl, x + 2, y + 4.5);
                doc.setFont("helvetica", "normal"); doc.text(val || "", x + w - 2, y + 4.5, { align: "right" });
            };

            doc.setFontSize(7);
            doc.text("PERMISIONARIO: GRUPO BACHOCO", 14, y); y += 4;
            row("FOLIO:", folio, 14, 45); row("FECHA:", data.fecha || new Date().toLocaleDateString(), 61, 45);
            row("UNIDAD:", data.unitId || "", 108, 40); row("PLACAS:", data.plates || "", 150, 45);
            y += 9;
            row("OPERADOR:", data.driverName || "", 14, 92); row("LICENCIA:", data.license || "", 108, 87);
            y += 9;
            row("ORIGEN:", data.origin || "", 14, 92); row("DESTINO:", data.destination || "", 108, 87);
            y += 12;

            // --- DIBUJAR REJILLA ---
            const drawLegalGrid = (startY, label, dayLogs, isDay2) => {
                doc.setFillColor(230); doc.rect(14, startY, 181, 5, 'F');
                doc.setTextColor(0); doc.setFont("helvetica", "bold"); doc.text(label, 105, startY + 3.5, { align: "center" });
                const gx = 20, gy = startY + 8, gw = 175, gh = 30, rowH = gh / 5;
                const statusLabels = ["CONDUCIENDO", "PAUSA", "AUXILIAR", "EXCEPCIÓN", "DESCANSO"];
                doc.setFontSize(5); doc.setDrawColor(150); doc.setLineWidth(0.1);
                statusLabels.forEach((s, i) => {
                    doc.text(s, 19, gy + (i * rowH) + (rowH / 2), { align: "right" });
                    doc.line(gx, gy + (i * rowH), gx + gw, gy + (i * rowH));
                });
                doc.line(gx, gy + gh, gx + gw, gy + gh);
                for (let i = 0; i <= 24; i++) {
                    let x = gx + (gw / 24) * i;
                    doc.line(x, gy, x, gy + gh);
                    if (i % 2 === 0) {
                        const rawHour = (shiftStart + i) % 24;
                        doc.text(rawHour.toString().padStart(2, "0"), x, gy - 2, { align: "center" });
                    }
                }
                doc.rect(gx, gy, gw, gh);
                if (dayLogs && dayLogs.length > 0) {
                    doc.setDrawColor(...azulOficial); doc.setLineWidth(0.7);
                    const mapSt = { 3: 0, 2: 1, 4: 2, 5: 3, 1: 4 };
                    dayLogs.forEach((l, i) => {
                        let ds = new Date(l.startTime), de = l.endTime ? new Date(l.endTime) : new Date();
                        let h1 = (ds.getHours() + ds.getMinutes() / 60 - shiftStart + 24) % 24;
                        let h2 = (de.getHours() + de.getMinutes() / 60 - shiftStart + 24) % 24;
                        let x1 = gx + (gw / 24) * h1, x2 = gx + (gw / 24) * h2;
                        const cruzaLimite = (de > ds) && (x2 < x1);
                        let rIdx = mapSt[l.status] !== undefined ? mapSt[l.status] : 4;
                        let yLine = gy + (rIdx * rowH) + (rowH / 2);
                        if (cruzaLimite) {
                            if (!isDay2) doc.line(x1, yLine, gx + gw, yLine);
                            else doc.line(gx, yLine, x2, yLine);
                        } else {
                            doc.line(x1, yLine, x2, yLine);
                        }
                        if (i > 0) {
                            let prev = dayLogs[i - 1];
                            let prevR = mapSt[prev.status] !== undefined ? mapSt[prev.status] : 4;
                            let prevY = gy + (prevR * rowH) + (rowH / 2);
                            let prevEnd = new Date(prev.endTime);
                            let hPrevEnd = (prevEnd.getHours() + prevEnd.getMinutes() / 60 - shiftStart + 24) % 24;
                            let xPrevEnd = gx + (gw / 24) * hPrevEnd;
                            if (Math.abs(x1 - xPrevEnd) < 2) doc.line(x1, prevY, x1, yLine);
                        }
                    });
                }
            };

            drawLegalGrid(y, "DÍA 1 (PRIMERAS 24 HORAS)", logsD1, false);
            y += 45;
            drawLegalGrid(y, "DÍA 2 (CONTINUACIÓN DE VIAJE)", logsD2, true);
            y += 45;

            // Tabla de desglose
            doc.setFontSize(9); doc.setTextColor(...naranja); doc.setFont("helvetica", "bold");
            doc.text("DESGLOSE DE ACTIVIDADES", 14, y);
            y += 4;
            doc.setFillColor(220); doc.rect(14, y, 181, 5, 'F');
            doc.setTextColor(0); doc.setFontSize(6);
            doc.text("HORA INICIO", 16, y + 3.5); doc.text("HORA FIN", 45, y + 3.5);
            doc.text("ACTIVIDAD", 75, y + 3.5); doc.text("DURACIÓN", 110, y + 3.5);
            doc.text("OBSERVACIONES / LUGAR", 140, y + 3.5);
            y += 5;
            doc.setFont("helvetica", "normal");
            logs.forEach((l, idx) => {
                if (y > 250) {
                    doc.addPage(); y = 20;
                    doc.setFillColor(220); doc.rect(14, y, 181, 5, 'F');
                    doc.setTextColor(0); doc.setFontSize(6);
                    doc.text("HORA INICIO", 16, y + 3.5); doc.text("HORA FIN", 45, y + 3.5);
                    doc.text("ACTIVIDAD", 75, y + 3.5); doc.text("DURACIÓN", 110, y + 3.5);
                    doc.text("OBSERVACIONES / LUGAR", 140, y + 3.5);
                    y += 5; doc.setFont("helvetica", "normal");
                }
                const stName = ["", "DESCANSO", "PAUSA", "MANEJANDO", "SERVICIO", "EXCEPCIÓN"][l.status] || "OTRO";
                const s = new Date(l.startTime), e = l.endTime ? new Date(l.endTime) : new Date();
                const dur = Math.floor((e - s) / 60000);
                if (idx % 2 === 0) { doc.setFillColor(250); doc.rect(14, y, 181, 4, 'F'); }
                doc.text(s.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), 16, y + 3);
                doc.text(e.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), 45, y + 3);
                doc.text(stName, 75, y + 3);
                doc.text(`${Math.floor(dur / 60)}h ${dur % 60}m`, 110, y + 3);
                doc.text(([l.place, l.observation].filter(Boolean).join(' / ') || "-").substring(0, 35), 140, y + 3);
                y += 4;
            });

            // Firmas
            if (y > 230) { doc.addPage(); y = 30; }
            y += 10;
            doc.setDrawColor(0);
            if (data.signatureOp) {
                try { doc.addImage(data.signatureOp, 'PNG', 35, y, 40, 18); } catch (e) { /* skip if invalid */ }
            }
            if (data.signatureSup) {
                try { doc.addImage(data.signatureSup, 'PNG', 125, y, 40, 18); } catch (e) { /* skip if invalid */ }
            }
            doc.line(30, y + 20, 80, y + 20);
            doc.setFontSize(7); doc.text("FIRMA CONDUCTOR", 55, y + 23, { align: "center" });
            doc.line(120, y + 20, 170, y + 20);
            doc.text("FIRMA SUPERVISOR", 145, y + 23, { align: "center" });
            doc.setFontSize(5); doc.setTextColor(100);
            doc.text("HAGO CONSTAR QUE LOS DATOS SON VERÍDICOS Y REFLEJAN FIELMENTE MIS ACTIVIDADES.", 105, y + 30, { align: "center" });

            // Página 2: Reglamento
            doc.addPage();
            doc.setFillColor(...naranja); doc.rect(0, 0, 210, 15, 'F');
            doc.setTextColor(255); doc.setFontSize(12); doc.setFont("helvetica", "bold");
            doc.text("REGLAMENTO NOM-087-SCT-2-2017", 105, 10, { align: "center" });
            doc.setTextColor(0); doc.setFontSize(8);
            let ry = 25;
            const rules = [
                "4.1 TIEMPOS: Todo conductor debe realizar una pausa de 30 minutos cuando ha conducido hasta 5 horas continuas.",
                "4.2 PAUSAS: Los periodos de pausa no son acumulables.",
                "4.6 RUTAS LARGAS: En rutas de max 14 horas, el conductor debe tener una pausa no menor a 8 horas continuas.",
                "4.7 MÁXIMO 24H: El tiempo máximo de conducción en 24 horas nunca podrá exceder las 14 horas.",
                "3.4 EXCEPCIONES: El tiempo puede prolongarse por avería o perturbación del servicio, debiendo evidenciarse."
            ];
            rules.forEach(r => {
                const split = doc.splitTextToSize(r, 180);
                doc.text(split, 14, ry);
                ry += (split.length * 4) + 4;
            });

            return doc;
        }

        function descargarPDF() {
            if (!pdfDoc) return;
            const folio = pdfDoc._bitacoraFolio || "PDF";
            pdfDoc.save(`Bitacora_${folio}.pdf`);
        }

        async function cargarBitacora() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            if (!id) {
                showError("No se proporcionó un ID de bitácora. Escanea el código QR correctamente.");
                return;
            }

            try {
                const resp = await fetch(`/api/store-bitacora?id=${encodeURIComponent(id)}`);
                if (!resp.ok) {
                    const err = await resp.json().catch(() => ({}));
                    if (resp.status === 404) {
                        showError("La bitácora no fue encontrada o ha expirado (válida 24 horas). Pide al operador que genere un nuevo QR.");
                    } else {
                        showError("Error al cargar la bitácora: " + (err.error || resp.statusText));
                    }
                    return;
                }

                const data = await resp.json();

                setStatus("Generando PDF…", "Construyendo el documento, un momento…", false);

                // Small delay so the browser renders the status update
                await new Promise(r => setTimeout(r, 100));

                pdfDoc = generarPDF(data);
                if (!pdfDoc) return;
                pdfDoc._bitacoraFolio = data.folio || "PDF";

                const pdfDataUri = pdfDoc.output('datauristring');

                document.getElementById('status-box').style.display = 'none';
                document.getElementById('viewer-info').style.display = 'block';

                const frame = document.getElementById('pdf-frame');
                frame.src = pdfDataUri;
                frame.style.display = 'block';

                // On mobile, inline PDF may not display in iframe; show download button as fallback
                frame.onerror = () => {
                    showDownloadFallback();
                };
                // After a timeout, if the frame seems empty, show download button
                setTimeout(() => {
                    try {
                        if (frame.contentDocument && frame.contentDocument.body &&
                            frame.contentDocument.body.innerHTML === '') {
                            showDownloadFallback();
                        }
                    } catch (e) {
                        // Cross-origin or security error — show download fallback
                        showDownloadFallback();
                    }
                }, 2000);

            } catch (err) {
                showError("Error de red: " + err.message + ". Verifica tu conexión a internet.");
            }
        }

        function showDownloadFallback() {
            document.getElementById('status-box').style.display = 'block';
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('status-title').textContent = '✅ Bitácora Lista';
            document.getElementById('status-title').style.color = '#16a34a';
            document.getElementById('status-msg').textContent = 'Tu navegador no puede mostrar el PDF en línea. Descárgalo para verlo.';
            document.getElementById('download-btn').style.display = 'block';
            document.getElementById('pdf-frame').style.display = 'none';
            document.getElementById('viewer-info').style.display = 'none';
        }

        cargarBitacora();
    </script>
</body>
</html>
